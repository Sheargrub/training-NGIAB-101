name: Send repository dispatch on push
run-name: Send repository dispatch on push

on:
  push

jobs:
  send_dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          filter: 'blob:none' # only retrieve metadata

      - name: 'Send repository dispatch'
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: deployment-pushed