name: Deploy branch gh-pages to composite target
run-name: Deploy branch gh-pages to composite target

on:
  repository_dispatch:
    types: [deployment-pushed]
  workflow_dispatch:

env:
  TARGET_REPO: ${{ vars.COMPOSITE_TARGET_REPO }}
  TARGET_PATH: /training-NGIAB-101

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: ci-ngiab-101-prod
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      # The native Carpentries workflows already take care of building, so this can be deployed with no extra steps!
      - name: Deploy to composite repository
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: '.'
          ssh-key: ${{ secrets.SSH_DEPLOY_NGIAB_SUBDOMAIN }}
          repository-name: ${{ env.TARGET_REPO }}
          target-folder: ${{ env.TARGET_PATH }}
          clean: true # Set to false if deploying to a composite repository's root!
          git-config-name: "github-actions"
          git-config-email: "github-actions@github.com"